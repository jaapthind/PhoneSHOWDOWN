<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPARE - Phone Comparison</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #020617;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Liquid Glassmorphism Background */
        .liquid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            animation: liquidFloat 25s infinite alternate ease-in-out;
        }

        .blob:nth-child(1) {
            width: 60vw;
            height: 60vw;
            background: #4f46e5;
            top: -20%;
            left: -10%;
        }

        .blob:nth-child(2) {
            width: 50vw;
            height: 50vw;
            background: #db2777;
            bottom: -20%;
            right: -10%;
            animation-delay: -5s;
        }

        .blob:nth-child(3) {
            width: 40vw;
            height: 40vw;
            background: #0ea5e9;
            top: 30%;
            left: 30%;
            animation-delay: -10s;
        }

        @keyframes liquidFloat {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            50% { transform: translate(10vw, 15vh) scale(1.2) rotate(180deg); border-radius: 60% 40% 30% 70% / 50% 60% 40% 60%; }
            100% { transform: translate(-10vw, -10vh) scale(0.9) rotate(360deg); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
        }

        /* Main App Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8, #e879f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(56, 189, 248, 0.2);
        }

        p.subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        /* Glassmorphism Classes */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .glass-panel {
            padding: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-highlight);
        }

        /* Controls Area */
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .selector-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .selector-group h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            text-align: center;
            color: var(--accent);
        }

        select {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            color: var(--text-primary);
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            outline: none;
            cursor: pointer;
            appearance: none;
            backdrop-filter: blur(10px);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        select:hover, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        select option {
            background: #0f172a;
            color: #fff;
            padding: 10px;
        }

        /* Comparison Area */
        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .device-card {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .device-header {
            text-align: center;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .device-header h3 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .spec-item {
            display: flex;
            flex-direction: column;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid transparent;
            transition: background 0.3s, border 0.3s;
        }

        .spec-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
        }

        .spec-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
        }

        .spec-value {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.4;
        }

        /* Empty State */
        .empty-state {
            grid-column: span 2;
            text-align: center;
            padding: 5rem 2rem;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .controls-grid, .comparison-grid {
                grid-template-columns: 1fr;
            }
            .device-header {
                position: sticky;
                top: 0;
                background: rgba(15, 23, 42, 0.8);
                backdrop-filter: blur(20px);
                z-index: 10;
                padding-top: 1rem;
                border-radius: 12px;
            }
        }
    </style>

        document.addEventListener('DOMContentLoaded', () => {
            const brand1Select = document.getElementById('brand1');

            const model2Select = document.getElementById('model2');

            let phone1Data = null;
            let phone2Data = null;

            // Extract unique brands and sort them
            const uniqueBrands = [...new Set(phoneDatabase.map(p => p.brand))].sort();

            // Populate Brand Selects
            uniqueBrands.forEach(brand => {
                const opt1 = document.createElement('option');
                opt1.value = brand;
                opt1.textContent = brand;
                brand1Select.appendChild(opt1);

                const opt2 = document.createElement('option');
                opt2.value = brand;
                opt2.textContent = brand;
                brand2Select.appendChild(opt2);
            });

            // Handle Brand 1 Change
            brand1Select.addEventListener('change', (e) => {
                const selectedBrand = e.target.value;
                populateModels(selectedBrand, model1Select);
                model1Select.disabled = false;
                phone1Data = null; 
                renderComparison();
            });

            // Handle Brand 2 Change
            brand2Select.addEventListener('change', (e) => {
                const selectedBrand = e.target.value;
                populateModels(selectedBrand, model2Select);
                model2Select.disabled = false;
                phone2Data = null;
                renderComparison();
            });

            // Handle Model 1 Change
            model1Select.addEventListener('change', (e) => {
                const selectedModel = e.target.value;
                phone1Data = phoneDatabase.find(p => p.model === selectedModel);
                renderComparison();
            });

            // Handle Model 2 Change
            model2Select.addEventListener('change', (e) => {
                const selectedModel = e.target.value;
                phone2Data = phoneDatabase.find(p => p.model === selectedModel);
                renderComparison();
            });

            // Populate models based on brand
            function populateModels(brand, modelSelect) {
                modelSelect.innerHTML = '<option value="" disabled selected>Select Model</option>';
                const models = phoneDatabase.filter(p => p.brand === brand).map(p => p.model);
                models.forEach(model => {
                    const opt = document.createElement('option');
                    opt.value = model;
                    opt.textContent = model;
                    modelSelect.appendChild(opt);
                });
            }

            // Render Comparison Grid
            function renderComparison() {
                if (!phone1Data || !phone2Data) {
                    comparisonContainer.innerHTML = `
                        <div class="empty-state glass">

                    return;
